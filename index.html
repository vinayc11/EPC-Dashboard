<script>const { useState, useMemo, Fragment } = React;

// ─── STYLES ──────────────────────────────────────────────────────────────────
const S = {
  root: {
    minHeight: "100vh",
    background: "#f1f5f9",
    fontFamily: "system-ui,sans-serif"
  },
  hdr: {
    background: "#0f172a",
    padding: "12px 20px"
  },
  main: {
    maxWidth: 1560,
    margin: "0 auto",
    padding: "14px 20px"
  },
  lay: {
    display: "grid",
    gridTemplateColumns: "240px 1fr",
    gap: 14
  },
  panel: {
    background: "#fff",
    border: "1.5px solid #e2e8f0",
    borderRadius: 12,
    padding: 14
  },
  tabs: {
    display: "flex",
    gap: 2,
    marginBottom: 12,
    background: "#e2e8f0",
    padding: 3,
    borderRadius: 8,
    flexWrap: "wrap"
  },
  tab: {
    padding: "4px 11px",
    borderRadius: 6,
    border: "none",
    cursor: "pointer",
    fontSize: 10,
    fontWeight: 700
  },
  card: {
    background: "#fff",
    borderRadius: 8,
    padding: "7px 9px",
    cursor: "pointer",
    border: "1.5px solid #e2e8f0",
    marginBottom: 4
  }
};
const G = {
  green: {
    bg: "#d1fae5",
    tx: "#065f46"
  },
  amber: {
    bg: "#fef3c7",
    tx: "#92400e"
  },
  red: {
    bg: "#fee2e2",
    tx: "#991b1b"
  },
  neu: {
    bg: "#f1f5f9",
    tx: "#64748b"
  }
};
const tl = (v, g, a, lo = true) => v == null ? "neu" : lo ? v <= g ? "green" : v <= a ? "amber" : "red" : v >= g ? "green" : v >= a ? "amber" : "red";

const bdg = (v, c) => {
  const s = G[c] || G.neu;
  return `<span style="display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;font-size:9px;font-weight:700;background:${s.bg};color:${s.tx}">${v}</span>`;
};
const thS = "padding:5px 7px;text-align:left;font-size:9px;font-weight:700;color:#94a3b8;border-bottom:1px solid #1e293b;background:#0f172a;white-space:nowrap";
const tdS = "padding:5px 7px;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:middle";
const tblWrap = (html, minW = 600) => `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:10px;min-width:${minW}px">${html}</table></div>`;

  const dp = 30 + Math.round(hsh(t, i + 50) / 166);
  return {
    dt,
    vol,
    dv: Math.round(vol * dp / 100),
    dp,
    px: Math.round(cmp * (1 + (hsh(t, i + 100) / 10000 - 0.5) * 0.04 * (15 - i) / 15) * 100) / 100
  };
});

function buildPeerHTML(cos, sortKey, sortDir, filterBkt) {
  const filtered = filterBkt === "All" ? cos : cos.filter(c => c.bucket === filterBkt);
  const sorted = sortKey ? [...filtered].sort((a, b) => {
    const va = sortKey === "sc" ? score(a) : a[sortKey] ?? -Infinity;
    const vb = sortKey === "sc" ? score(b) : b[sortKey] ?? -Infinity;
    return sortDir === "asc" ? va - vb : vb - va;
  }) : filtered;
  const ths = ["Company", "OB/Rev", "EBITDA%", "Bid-Win%", "Sub%", "DSO", "ND/EBITDA", "Pledge%", "Score"];
  const keys = [null, "ob", "em", "bwr", "sub", "dso", "nd", "pledge", "sc"];
  let head = `<thead><tr>${ths.map((h, i) => `<th style="${thS};text-align:${i === 0 ? "left" : "center"};cursor:pointer" data-k="${keys[i] || ""}">${h}${sortKey === keys[i] ? sortDir === "asc" ? " ▲" : " ▼" : " ⇅"}</th>`).join("")}</tr></thead>`;
  let body = "<tbody>";
  BO.filter(b => filterBkt === "All" || b === filterBkt).forEach(bucket => {
    const rows = sorted.filter(c => c.bucket === bucket);
    if (!rows.length) return;
    const bc = BKT[bucket];
    body += `<tr><td colspan="9" style="padding:4px 8px;background:${bc}22;border-top:2px solid ${bc};font-size:9px;font-weight:800;color:${bc};text-transform:uppercase;letter-spacing:.04em">${bucket} · ${rows.length} co.</td></tr>`;
    rows.forEach((c, i) => {
      const sc = score(c),
        cc = sc >= 7 ? "#10b981" : sc >= 5 ? "#f59e0b" : "#ef4444";
      const ob = OBD[c.ticker];
      const obHtml = ob ? `<div style="position:relative;display:inline-block"><button onclick="window.__obToggle('${c.ticker}')" style="background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:2px 7px;cursor:pointer;font-size:9px;font-weight:700">View ▾</button></div>` : "-";
      body += `<tr style="background:${i % 2 ? "#fff" : "#f8fafc"}">
        <td style="${tdS};border-left:3px solid ${bc};padding-left:8px"><div style="font-weight:800;font-size:11px;color:#1e293b">${c.ticker}</div><div style="font-size:7px;color:#94a3b8">${c.name}</div></td>
        <td style="${tdS};text-align:center">${bdg(c.ob + "x", tl(c.ob, 5, 2, false))}</td>
        <td style="${tdS};text-align:center">${bdg(c.em + "%", tl(c.em, 12, 9, false))}</td>
        <td style="${tdS};text-align:center">${bdg(c.bwr + "%", tl(c.bwr, 40, 28, false))}<div style="font-size:7px;color:#94a3b8">${c.bw}/${c.bs}</div></td>
        <td style="${tdS};text-align:center;font-family:monospace;font-weight:700;color:${c.sub <= 50 ? "#10b981" : c.sub <= 65 ? "#f59e0b" : "#ef4444"}">${c.sub}%</td>
        <td style="${tdS};text-align:center">${bdg(c.dso + "d", tl(c.dso, 100, 160))}</td>
        <td style="${tdS};text-align:center">${bdg(c.nd + "x", tl(c.nd, 1, 2.5))}</td>
        <td style="${tdS};text-align:center">${bdg(c.pledge + "%", tl(c.pledge, 5, 20))}</td>
        <td style="${tdS};text-align:center;font-weight:900;font-size:13px;font-family:monospace;color:${cc}">${sc}</td>
      </tr>`;
    });
  });
  body += "</tbody>";
  return tblWrap(head + body, 900);
}
function buildTradeHTML(ticker) {
  const d = CD[ticker];
  if (!d) return `<p style="color:#94a3b8;padding:20px;text-align:center">No data for ${ticker}</p>`;
  const rows = genTrade(ticker, d.cmp, d.mcap);
  const avgV = Math.round(rows.reduce((a, r) => a + r.vol, 0) / rows.length);
  const avgD = Math.round(rows.reduce((a, r) => a + r.dp, 0) / rows.length);
  const hi = Math.max(...rows.map(r => r.px)),
    lo = Math.min(...rows.map(r => r.px));
  const stats = [["CMP", "₹" + fi(d.cmp), "#1a56db"], ["Avg Vol", fi(avgV), "#0891b2"], ["Avg Del%", avgD + "%", "#0d9488"], ["15D Hi", "₹" + hi, "#059669"], ["15D Lo", "₹" + lo, "#ef4444"]];
  let html = `<div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap">${stats.map(([l, v, c]) => `<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:7px 12px;flex:1;min-width:80px;text-align:center"><div style="font-size:8px;color:#94a3b8;font-weight:700;text-transform:uppercase">${l}</div><div style="font-size:13px;font-weight:900;color:${c};font-family:monospace;margin-top:1px">${v}</div></div>`).join("")}</div>`;
  const head = `<thead><tr>${["Date", "Traded Vol", "Delivery Vol", "Del%", "Close ₹"].map(h => `<th style="${thS};text-align:${h === "Date" ? "left" : "right"}">${h}</th>`).join("")}</tr></thead>`;
  let body = "<tbody>";
  rows.forEach((r, i) => {
    const dc = r.dp >= 65 ? "#059669" : r.dp >= 40 ? "#d97706" : "#94a3b8";
    const isHi = r.px === hi,
      isLo = r.px === lo;
    body += `<tr style="background:${i % 2 ? "#fff" : "#f8fafc"}"><td style="${tdS};font-family:monospace;font-weight:600">${r.dt}</td><td style="${tdS};text-align:right;font-family:monospace">${fi(r.vol)}</td><td style="${tdS};text-align:right;font-family:monospace">${fi(r.dv)}</td><td style="${tdS};text-align:right"><div style="display:flex;align-items:center;justify-content:flex-end;gap:4px"><div style="width:30px;height:4px;background:#e2e8f0;border-radius:2px"><div style="width:${r.dp}%;height:100%;background:${dc};border-radius:2px"></div></div><span style="font-family:monospace;font-weight:700;color:${dc};min-width:26px">${r.dp}%</span></div></td><td style="${tdS};text-align:right;font-family:monospace;font-weight:800;color:${isHi ? "#059669" : isLo ? "#ef4444" : "#1e293b"}">₹${fi(r.px)}${isHi ? " ▲" : isLo ? " ▼" : ""}</td></tr>`;
  });
  body += `<tr style="background:#0f172a"><td style="${tdS};color:#94a3b8;font-weight:700;font-size:9px">15D Avg</td><td style="${tdS};text-align:right;font-family:monospace;color:#f1f5f9;font-weight:800">${fi(avgV)}</td><td style="${tdS};text-align:right;font-family:monospace;color:#f1f5f9;font-weight:800">${fi(Math.round(avgV * avgD / 100))}</td><td style="${tdS};text-align:right;font-family:monospace;color:#f1f5f9;font-weight:800">${avgD}%</td><td style="${tdS};text-align:right;font-family:monospace;color:#f1f5f9;font-weight:800">₹${fi(d.cmp)}</td></tr>`;
  return html + tblWrap(head + body, 480) + `<div style="margin-top:6px;font-size:8px;color:#94a3b8">Delivery% &gt;65% = conviction accumulation. Indicative — verify from NSE/BSE bhav copy.</div>`;
}

// Compute guidance accuracy for trailing 8 quarters from GD
function guidanceAccuracy8Q(ticker) {
  const rows = (GD[ticker]?.hq || []).slice(0, 8);
  if (!rows.length) return null;
  const hit = rows.filter(r => r[4] === "beat" || r[4] === "met").length;
  return Math.round(hit / rows.length * 100);
}

// Compute per-ticker checklist scores
function computeChecklist(ticker) {
  const co = COS.find(c => c.ticker === ticker);
  const cd = CD[ticker];
  const roeD = ROEDATA[ticker];
  const provD = PROVDATA[ticker];
  const cfoD = CFODATA[ticker];
  const arb = ARBLEGAL[ticker];
  const guidAcc = guidanceAccuracy8Q(ticker);

  // C1: OB/Revenue > 2.5x (ob from COS)
  const c1val = co?.ob ?? null;
  const c1pass = c1val != null && c1val > 2.5;
  const c1sc = c1val == null ? 0 : c1val >= 3.5 ? 2 : c1val >= 2.5 ? 1 : 0;

  // C2: Guidance accuracy > 60% over trailing 8Q
  const c2val = guidAcc;
  const c2pass = c2val != null && c2val >= 60;
  const c2sc = c2val == null ? 0 : c2val >= 75 ? 2 : c2val >= 60 ? 1 : 0;

  // C3: ROE and ROCE both >15% across 4 years (need BOTH to avg >15%)
  const avgRoe = roeD ? roeD.roe.filter(x => x != null).reduce((a, b) => a + b, 0) / roeD.roe.filter(x => x != null).length : null;
  const avgRoce = roeD ? roeD.roce.filter(x => x != null).reduce((a, b) => a + b, 0) / roeD.roce.filter(x => x != null).length : null;
  const c3pass = avgRoe != null && avgRoce != null && avgRoe >= 15 && avgRoce >= 15;
  const c3sc = avgRoe == null || avgRoce == null ? 0 : Math.min(avgRoe, avgRoce) >= 18 ? 2 : Math.min(avgRoe, avgRoce) >= 15 ? 1 : 0;

  // C4: Bid-to-win ratio > 20% (bwr from COS)
  const c4val = co?.bwr ?? null;
  const c4pass = c4val != null && c4val > 20;
  const c4sc = c4val == null ? 0 : c4val >= 30 ? 2 : c4val >= 20 ? 1 : 0;

  // C5: Provisions/write-offs as % NP — lower is better (<5% good, <10% ok)
  const latestProv = provD?.[3] ?? provD?.[2] ?? null;
  const c5pass = latestProv != null && latestProv < 5;
  const c5sc = latestProv == null ? 0 : latestProv < 3 ? 2 : latestProv < 5 ? 1 : 0;

  // C6: EBITDA-to-CFO conversion — higher is better (>70% good, >55% ok)
  const latestCfo = cfoD?.[3] ?? cfoD?.[2] ?? null;
  const c6pass = latestCfo != null && latestCfo >= 65;
  const c6sc = latestCfo == null ? 0 : latestCfo >= 75 ? 2 : latestCfo >= 65 ? 1 : 0;

  // C7: Arbitration/legal as % NW — lower is better (<10% good, <20% ok)
  const c7pass = arb != null && arb < 10;
  const c7sc = arb == null ? 0 : arb < 5 ? 2 : arb < 10 ? 1 : 0;

  // Total score out of 14
  const total = c1sc + c2sc + c3sc + c4sc + c5sc + c6sc + c7sc;
  // Scale to 10
  const scaled = +(total / 14 * 10).toFixed(1);
  return {
    c1: {
      val: c1val,
      pass: c1pass,
      sc: c1sc,
      label: "OB/Rev Ratio"
    },
    c2: {
      val: c2val,
      pass: c2pass,
      sc: c2sc,
      label: "Guidance Accuracy 8Q"
    },
    c3: {
      val: {
        roe: avgRoe,
        roce: avgRoce
      },
      pass: c3pass,
      sc: c3sc,
      label: "ROE & ROCE >15%"
    },
    c4: {
      val: c4val,
      pass: c4pass,
      sc: c4sc,
      label: "Bid-to-Win Ratio"
    },
    c5: {
      val: latestProv,
      pass: c5pass,
      sc: c5sc,
      label: "Provisions/Write-offs"
    },
    c6: {
      val: latestCfo,
      pass: c6pass,
      sc: c6sc,
      label: "EBITDA-to-CFO Conv."
    },
    c7: {
      val: arb,
      pass: c7pass,
      sc: c7sc,
      label: "Arbitration/Legal Exposure"
    },
    total,
    scaled,
    roeArr: roeD?.roe ?? [],
    roceArr: roeD?.roce ?? [],
    provArr: provD ?? [],
    cfoArr: cfoD ?? []
  };
}
